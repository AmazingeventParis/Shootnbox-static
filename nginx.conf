server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Auth basique desactivee (noindex suffit)
    # auth_basic "Staging Shootnbox";
    # auth_basic_user_file /etc/nginx/conf.d/.htpasswd;

    # Bloquer les robots
    location = /robots.txt {
        auth_basic off;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|webp|gif|svg|css|js|woff2|woff)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
