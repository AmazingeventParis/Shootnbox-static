<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview - stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700;1,800;1,900&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; padding: 0; font-family: "Raleway", sans-serif; color: #333; line-height: 1.6; background: #fff; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
a { text-decoration: none; color: inherit; }
img { max-width: 100%; height: auto; }
ul { list-style: none; padding: 0; margin: 0; }
</style>
</head>
<body>

<style>
.snb-stats {
  padding:50px 20px;
  background:linear-gradient(135deg, #FFF8EE 0%, #fff0f8 40%, #FFF8EE 70%, #f0f0ff 100%);
  font-family:'Raleway',sans-serif;
  position:relative; overflow:hidden;
}
.snb-stats .stats-wave {
  position:absolute; bottom:-20px; left:0; right:0; height:120px;
  z-index:0; pointer-events:none;
  animation:snbWaveSlide 8s ease-in-out infinite alternate;
}
.snb-stats .stats-wave svg { width:100%; height:100%; }
.snb-stats .stats-wave path:first-child {
  animation:snbWavePulse 6s ease-in-out infinite alternate;
}
.snb-stats .stats-wave path:last-child {
  animation:snbWavePulse 7s ease-in-out infinite alternate-reverse;
}
.snb-stats .stats-brush {
  position:absolute; top:50%; left:-5%; transform:translateY(-50%) rotate(-3deg);
  width:110%; height:60px; z-index:0; pointer-events:none; opacity:0.08;
  animation:snbBrushDrift 10s ease-in-out infinite alternate;
}
.snb-stats .stats-brush svg { width:100%; height:100%; }
.snb-stats .stats-dot {
  position:absolute; border-radius:50%; z-index:0; pointer-events:none;
}
.snb-stats .stats-dot.d1 { width:80px; height:80px; top:10%; right:5%; background:radial-gradient(circle, rgba(229,25,129,0.08) 0%, transparent 70%); animation:snbDotFloat1 7s ease-in-out infinite alternate; }
.snb-stats .stats-dot.d2 { width:120px; height:120px; bottom:15%; left:3%; background:radial-gradient(circle, rgba(2,80,255,0.06) 0%, transparent 70%); animation:snbDotFloat2 9s ease-in-out infinite alternate; }
.snb-stats .stats-dot.d3 { width:60px; height:60px; top:20%; left:15%; background:radial-gradient(circle, rgba(229,25,129,0.06) 0%, transparent 70%); animation:snbDotFloat3 6s ease-in-out infinite alternate; }
@keyframes snbWaveSlide {
  0% { transform:translateX(-15px); }
  100% { transform:translateX(15px); }
}
@keyframes snbWavePulse {
  0% { opacity:0.6; stroke-dashoffset:0; }
  50% { opacity:1; }
  100% { opacity:0.6; stroke-dashoffset:20; }
}
@keyframes snbBrushDrift {
  0% { transform:translateY(-50%) rotate(-3deg) translateX(-8px); opacity:0.06; }
  50% { opacity:0.1; }
  100% { transform:translateY(-50%) rotate(-1deg) translateX(8px); opacity:0.06; }
}
@keyframes snbDotFloat1 {
  0% { transform:translate(0, 0) scale(1); opacity:0.7; }
  50% { opacity:1; }
  100% { transform:translate(-12px, 10px) scale(1.15); opacity:0.7; }
}
@keyframes snbDotFloat2 {
  0% { transform:translate(0, 0) scale(1); opacity:0.6; }
  50% { opacity:0.9; }
  100% { transform:translate(15px, -8px) scale(1.1); opacity:0.6; }
}
@keyframes snbDotFloat3 {
  0% { transform:translate(0, 0) scale(1); opacity:0.7; }
  50% { opacity:1; }
  100% { transform:translate(8px, 12px) scale(1.2); opacity:0.7; }
}
.snb-stats .stats-inner {
  max-width:900px; margin:0 auto; position:relative; z-index:1;
}
.snb-stats .stats-grid {
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:24px;
}
.snb-stats .stat-card {
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(10px);
  border-radius:20px;
  padding:32px 20px 28px;
  text-align:center;
  border:1.5px solid rgba(229,25,129,0.1);
  transition:all 0.4s ease;
  position:relative;
  overflow:hidden;
}
.snb-stats .stat-card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg, #E51981, #0250FF);
  opacity:0; transition:opacity 0.4s ease;
}
.snb-stats .stat-card:hover {
  transform:translateY(-6px);
  box-shadow:0 16px 40px rgba(229,25,129,0.15);
  border-color:rgba(229,25,129,0.25);
}
.snb-stats .stat-card:hover::before { opacity:1; }
.snb-stats .stat-icon {
  width:52px; height:52px; margin:0 auto 16px;
  display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg, rgba(229,25,129,0.08), rgba(2,80,255,0.05));
  border-radius:14px;
  transition:all 0.4s ease;
}
.snb-stats .stat-card:hover .stat-icon {
  transform:scale(1.1) rotate(-3deg);
  background:linear-gradient(135deg, rgba(229,25,129,0.15), rgba(2,80,255,0.1));
}
.snb-stats .stat-icon svg {
  width:28px; height:28px;
}
.snb-stats .stat-number {
  font-size:36px; font-weight:900; color:#323338;
  line-height:1; margin-bottom:6px;
  background:linear-gradient(135deg, #E51981 0%, #c0137a 50%, #0250FF 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.snb-stats .stat-label {
  font-size:10px; font-weight:700; letter-spacing:2px;
  text-transform:uppercase; color:#E51981;
  line-height:1.3;
  border:1.5px solid rgba(229,25,129,0.2);
  background:linear-gradient(135deg, rgba(229,25,129,0.04), rgba(2,80,255,0.03));
  padding:5px 14px; border-radius:30px;
  display:inline-block; margin-bottom:14px;
  transition:all 0.4s ease;
}
.snb-stats .stat-card:hover .stat-label {
  border-color:rgba(229,25,129,0.4);
  background:linear-gradient(135deg, rgba(229,25,129,0.08), rgba(2,80,255,0.05));
}
.snb-stats .stat-number {
  opacity:0; transform:translateY(15px);
  transition:opacity 0.6s ease, transform 0.6s ease;
}
.snb-stats .stat-card.visible .stat-number {
  opacity:1; transform:translateY(0);
}
.snb-stats .stat-card:nth-child(2) .stat-number { transition-delay:0.15s; }
.snb-stats .stat-card:nth-child(3) .stat-number { transition-delay:0.3s; }
.snb-stats .stat-icon {
  opacity:0; transform:translateY(10px) scale(0.8);
  transition:all 0.5s ease;
}
.snb-stats .stat-card.visible .stat-icon {
  opacity:1; transform:translateY(0) scale(1);
}
.snb-stats .stat-card:nth-child(2) .stat-icon { transition-delay:0.1s; }
.snb-stats .stat-card:nth-child(3) .stat-icon { transition-delay:0.2s; }
@media (max-width:768px) {
  .snb-stats { padding:40px 16px; }
  .snb-stats .stats-grid { gap:16px; }
  .snb-stats .stat-card { padding:24px 16px 22px; }
  .snb-stats .stat-number { font-size:28px; }
  .snb-stats .stat-label { font-size:10px; letter-spacing:2px; }
  .snb-stats .stat-icon { width:44px; height:44px; margin-bottom:12px; }
  .snb-stats .stat-icon svg { width:24px; height:24px; }
}
@media (max-width:480px) {
  .snb-stats { padding:30px 16px; }
  .snb-stats .stats-grid {
    grid-template-columns:1fr;
    gap:12px;
    max-width:260px; margin:0 auto;
  }
  .snb-stats .stat-card { padding:24px 16px 20px; text-align:center; border-radius:18px; }
  .snb-stats .stat-icon { width:44px; height:44px; margin:0 auto 10px; border-radius:12px; }
  .snb-stats .stat-icon svg { width:22px; height:22px; }
  .snb-stats .stat-number { font-size:32px; }
  .snb-stats .stat-label { font-size:12px; letter-spacing:2px; padding:6px 16px; margin-bottom:12px; }
}
</style>
<div class="snb-stats">
  <div class="stats-dot d1"></div>
  <div class="stats-dot d2"></div>
  <div class="stats-dot d3"></div>

  <div class="stats-brush">
    <svg viewBox="0 0 1200 60" preserveAspectRatio="none" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0 35C100 15 200 50 400 30C600 10 800 45 1000 25C1100 18 1150 35 1200 30" stroke="#E51981" stroke-width="40" stroke-linecap="round" fill="none"/>
    </svg>
  </div>

  <div class="stats-wave">
    <svg viewBox="0 0 1200 120" preserveAspectRatio="none" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0 60C200 20 400 90 600 50C800 10 1000 80 1200 40" stroke="rgba(229,25,129,0.1)" stroke-width="1.5" fill="none"/>
      <path d="M0 80C200 40 400 110 600 70C800 30 1000 100 1200 60" stroke="rgba(2,80,255,0.06)" stroke-width="1" fill="none"/>
    </svg>
  </div>

  <div class="stats-inner">
    <div class="stats-grid">

      <div class="stat-card">
        <div class="stat-label">Photos captur&#233;es</div>
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#E51981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </div>
        <div class="stat-number" data-target="1658259">0</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Mariages &amp; anniversaires</div>
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#E51981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="12" r="5"/>
            <circle cx="15" cy="12" r="5"/>
          </svg>
        </div>
        <div class="stat-number" data-target="2150">0</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">&#201;v&#233;nements r&#233;alis&#233;s</div>
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#E51981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="10" r="6"/>
            <line x1="12" y1="16" x2="12" y2="22"/>
            <line x1="8" y1="7" x2="8.5" y2="5"/>
            <line x1="16" y1="7" x2="15.5" y2="5"/>
            <line x1="9" y1="12" x2="7" y2="13"/>
            <line x1="15" y1="12" x2="17" y2="13"/>
            <line x1="10" y1="9" x2="9" y2="7.5"/>
            <line x1="14" y1="9" x2="15" y2="7.5"/>
          </svg>
        </div>
        <div class="stat-number" data-target="4589">0</div>
      </div>

    </div>
  </div>
</div>

<script>
(function(){
  function snbFormatNumber(n) {
    return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
  }
  function snbAnimateCounter(el, target, duration) {
    var startTime = performance.now();
    function update(now) {
      var elapsed = now - startTime;
      var progress = Math.min(elapsed / duration, 1);
      var eased = 1 - Math.pow(1 - progress, 3);
      var current = Math.floor(eased * target);
      el.textContent = snbFormatNumber(current);
      if (progress < 1) requestAnimationFrame(update);
      else el.textContent = snbFormatNumber(target);
    }
    requestAnimationFrame(update);
  }
  var cards = document.querySelectorAll('.snb-stats .stat-card');
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        var card = entry.target;
        card.classList.add('visible');
        var numEl = card.querySelector('.stat-number');
        var target = parseInt(numEl.getAttribute('data-target'));
        var idx = Array.prototype.indexOf.call(cards, card);
        var delay = idx * 300;
        setTimeout(function(){ snbAnimateCounter(numEl, target, 2000); }, delay);
        observer.unobserve(card);
      }
    });
  }, { threshold: 0.3 });
  cards.forEach(function(card){ observer.observe(card); });
})();
</script>

</body>
</html>
