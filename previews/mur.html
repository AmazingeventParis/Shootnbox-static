.sm-filter-icon span {

/* ── STRIP DEFILANTE ── */
.sm-strip-wrap {
  margin-bottom: 50px;
  overflow: hidden;
  position: relative; z-index: 3;
  padding: 10px 0;
}
/* Fade edges */
.sm-strip-wrap::before,
.sm-strip-wrap::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  width: 80px;
  z-index: 5;
  pointer-events: none;
}
.sm-strip-wrap::before {
  left: 0;
  background: linear-gradient(to right, #1a1a2e, transparent);
}
.sm-strip-wrap::after {
  right: 0;
  background: linear-gradient(to left, #1a1a2e, transparent);
}

.sm-strip {
  display: flex;
  align-items: center;
  gap: 16px;
  width: max-content;
  animation: smSlide 45s linear infinite;
}
.sm-strip.paused { animation-play-state: paused; }
@keyframes smSlide { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
.sm-strip-wrap:hover .sm-strip { animation-play-state: paused; }

/* ── CARTE PHOTO ── */
.sm-photo {
  flex-shrink: 0;
  -webkit-user-select: none;

  transition: transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.4s ease;
  cursor: pointer;
}
.sm-photo:nth-child(odd) { transform: rotate(-1.2deg); }
.sm-photo:nth-child(even) { transform: rotate(1deg); }
.sm-photo:nth-child(3n) { transform: rotate(-0.5deg); }
.sm-photo:nth-child(5n) { transform: rotate(1.5deg); }

.sm-photo:hover {

.sm-photo img {

<script>
(function() {
  var btns = document.querySelectorAll('.sm-filter-btn');
  var photos = document.querySelectorAll('.sm-photo');
  var strip = document.getElementById('smStrip');
  var wrap = document.querySelector('.sm-strip-wrap');

  /* ── Filtres ── */
  var speeds = { all: '45s', paysage: '30s', portrait: '25s', slim: '15s' };

  btns.forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      btns.forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      var filter = btn.getAttribute('data-filter');

      strip.style.animation = 'none';
      photos.forEach(function(p) {
        if (filter === 'all' || p.getAttribute('data-cat') === filter) {
          p.classList.remove('hidden');
        } else {
          p.classList.add('hidden');
        }
      });
      var dur = speeds[filter] || '45s';
      setTimeout(function() {
        strip.style.animationDuration = dur;
        strip.style.animation = 'smSlide ' + dur + ' linear infinite';
      }, 50);
    });
  });


})();
</script>
