<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Shootnbox - Location Photobooth</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Raleway', sans-serif; color: #333; line-height: 1.6; background: #fff; overflow-x: hidden; }
a { text-decoration: none; color: inherit; }
.section-loaded { min-height: 20px; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="section-header" class="section-loaded"></div>

<!-- HERO -->
<div id="section-hero" class="section-loaded"></div>

<!-- TRUST (logos defilants) -->
<div id="section-trust" class="section-loaded"></div>

<!-- BENTO (mur de souvenirs) -->
<div id="section-bento" class="section-loaded"></div>

<!-- BORNES (nouveau design dark cards) -->
<div id="section-bornes" class="section-loaded"></div>

<!-- STATS -->
<div id="section-stats" class="section-loaded"></div>

<!-- AVIS (31 avis Google statiques) -->
<div id="section-avis" class="section-loaded"></div>

<!-- SAVOIR-FAIRE -->
<div id="section-savoirfaire" class="section-loaded"></div>

<!-- EQUIPE -->
<div id="section-equipe" class="section-loaded"></div>

<!-- BLOG -->
<div id="section-blog" class="section-loaded"></div>

<!-- FOOTER -->
<div id="section-footer" class="section-loaded"></div>

<script>
function loadSection(id, url) {
  fetch(url)
    .then(function(r) { return r.text(); })
    .then(function(html) {
      var el = document.getElementById(id);
      el.innerHTML = html;
      var scripts = el.querySelectorAll('script');
      scripts.forEach(function(s) {
        var ns = document.createElement('script');
        if (s.src) { ns.src = s.src; } else { ns.textContent = s.textContent; }
        document.body.appendChild(ns);
      });
    })
    .catch(function(err) { console.warn('Section ' + id + ' not loaded:', err); });
}

loadSection('section-header', '/sections/header.html');
loadSection('section-hero', '/sections/hero.html');
loadSection('section-trust', '/sections/trust.html');
loadSection('section-bento', '/sections/bento.html');
loadSection('section-bornes', '/sections/bornes.html');
loadSection('section-stats', '/sections/stats.html');
loadSection('section-avis', '/sections/avis.html');
loadSection('section-savoirfaire', '/sections/savoirfaire.html');
loadSection('section-equipe', '/sections/equipe.html');
loadSection('section-blog', '/sections/blog.html');
loadSection('section-footer', '/sections/footer.html');
</script>

</body>
</html>
