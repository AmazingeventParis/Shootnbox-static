<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autorisation Google - Shootnbox</title>
<style>
body { font-family: 'Raleway', Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
.box { background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; max-width: 500px; }
h1 { font-size: 22px; color: #323338; margin-bottom: 10px; }
p { color: #666; font-size: 14px; line-height: 1.6; }
.code { background: #1a1a2e; color: #0f0; padding: 16px; border-radius: 8px; font-family: monospace; font-size: 13px; word-break: break-all; margin: 20px 0; text-align: left; }
.btn { background: linear-gradient(135deg, #E51981, #c0137a); color: #fff; border: none; padding: 14px 32px; border-radius: 25px; font-weight: 700; font-size: 16px; cursor: pointer; text-decoration: none; display: inline-block; }
.btn:hover { opacity: 0.9; }
</style>
</head>
<body>
<div class="box" id="content">
  <h1>Connexion Google Business</h1>
  <p>Cliquez pour autoriser l'acces aux avis Google de ShootnBox</p>
  <br>
  <a class="btn" id="authBtn" href="#">Autoriser</a>
  <div class="code" id="result" style="display:none;"></div>
</div>
<script>
var CLIENT_ID = '278166374866-5tgi5pcvl8fda21v7pt3n55bag4e8e78.apps.googleusercontent.com'; // public client ID (safe for frontend)
var REDIRECT_URI = 'https://shootnbox.swipego.app/oauth-callback.html';
var SCOPE = 'https://www.googleapis.com/auth/business.manage';

// Build auth URL
var authUrl = 'https://accounts.google.com/o/oauth2/v2/auth?' +
  'client_id=' + encodeURIComponent(CLIENT_ID) +
  '&redirect_uri=' + encodeURIComponent(REDIRECT_URI) +
  '&response_type=code' +
  '&scope=' + encodeURIComponent(SCOPE) +
  '&access_type=offline' +
  '&prompt=consent';

document.getElementById('authBtn').href = authUrl;

// Check if we have a code in URL
var params = new URLSearchParams(window.location.search);
var code = params.get('code');
if (code) {
  document.getElementById('authBtn').style.display = 'none';
  document.getElementById('content').querySelector('p').textContent = 'Code d\'autorisation recu ! Copiez-le :';
  var resultDiv = document.getElementById('result');
  resultDiv.style.display = 'block';
  resultDiv.textContent = code;
}
</script>
</body>
</html>
