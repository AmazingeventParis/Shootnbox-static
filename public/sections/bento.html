<style>
.snb-bento {
  padding:40px 20px;
  background:linear-gradient(160deg, #FFF8EE 0%, #fff0f6 50%, #FFF8EE 100%);
  font-family:'Raleway',sans-serif;
  position:relative; overflow:hidden;
}
.snb-bento .bento-wave {
  position:absolute; left:0; right:0; top:50%; transform:translateY(-50%);
  height:300px; z-index:0; opacity:0.5; pointer-events:none;
}
.snb-bento .bento-wave svg { width:100%; height:100%; }
.snb-bento .bento-inner { max-width:1000px; margin:0 auto; position:relative; z-index:1; }
.snb-bento .bento-title { text-align:center; margin-bottom:24px; position:relative; }
.snb-bento .bento-title h2 {
  font-size:36px; font-weight:900; font-style:italic; color:#323338;
  line-height:1.3; margin:0; display:inline-block; position:relative;
}
.snb-bento .bento-title h2 span {
  color:#E51981; position:relative;
}
.snb-bento .bento-title h2 span::after {
  content:''; position:absolute; bottom:0; left:-4px; right:-4px; height:10px;
  background:linear-gradient(90deg, rgba(229,25,129,0.2), rgba(2,80,255,0.15));
  border-radius:4px; z-index:-1;
}
.snb-bento .deco-dots { position:absolute; top:50%; right:-70px; transform:translateY(-50%); }
.snb-bento .deco-dots span {
  display:block; border-radius:50%; border:2px solid #E51981;
}
.snb-bento .deco-dots .dot1 { width:20px; height:20px; opacity:0.5; margin-bottom:6px; }
.snb-bento .deco-dots .dot2 { width:12px; height:12px; opacity:0.3; margin-left:10px; }
.snb-bento .bento-grid {
  display:grid;
  grid-template-columns:1.1fr 1fr;
  grid-template-rows:1fr 1fr 1fr;
  gap:10px;
  height:560px;
}
.snb-bento .bento-card {
  position:relative; border-radius:16px; overflow:hidden;
  cursor:pointer; transition:transform 0.3s ease, box-shadow 0.3s ease;
  border:2px solid transparent;
}
.snb-bento .bento-card.card-main:hover {
  transform:translateY(-4px);
  box-shadow:0 12px 40px rgba(229,25,129,0.3);
  border-color:#E51981;
}
.snb-bento .bento-card.card-bleu:hover {
  transform:translateY(-4px);
  box-shadow:0 12px 40px rgba(2,80,255,0.25);
  border-color:#0250FF;
}
.snb-bento .bento-card.card-orange:hover {
  transform:translateY(-4px);
  box-shadow:0 12px 40px rgba(255,122,0,0.25);
  border-color:#FF7A00;
}
.snb-bento .bento-card.card-violet:hover {
  transform:translateY(-4px);
  box-shadow:0 12px 40px rgba(120,40,200,0.25);
  border-color:#7828C8;
}
.snb-bento .card-main .card-arrow { background:rgba(229,25,129,0.7); box-shadow:0 2px 10px rgba(229,25,129,0.3); }
.snb-bento .card-bleu .card-arrow { background:rgba(2,80,255,0.7); box-shadow:0 2px 10px rgba(2,80,255,0.3); }
.snb-bento .card-orange .card-arrow { background:rgba(255,122,0,0.7); box-shadow:0 2px 10px rgba(255,122,0,0.3); }
.snb-bento .card-violet .card-arrow { background:rgba(120,40,200,0.7); box-shadow:0 2px 10px rgba(120,40,200,0.3); }
.snb-bento .card-main:hover .card-arrow { background:#E51981; transform:scale(1.1); }
.snb-bento .card-bleu:hover .card-arrow { background:#0250FF; transform:scale(1.1); }
.snb-bento .card-orange:hover .card-arrow { background:#FF7A00; transform:scale(1.1); }
.snb-bento .card-violet:hover .card-arrow { background:#7828C8; transform:scale(1.1); }
.snb-bento .card-bleu .card-label { background:linear-gradient(135deg, #0250FF, #0140cc); }
.snb-bento .card-orange .card-label { background:linear-gradient(135deg, #FF7A00, #e06b00); }
.snb-bento .card-violet .card-label { background:linear-gradient(135deg, #7828C8, #6020a8); }
.snb-bento .bento-card img {
  width:100%; height:100%; object-fit:cover; object-position:center center; display:block;
  transition:transform 0.5s ease;
}
.snb-bento .bento-card:hover img { transform:scale(1.05); }
.snb-bento .bento-card .card-overlay {
  position:absolute; inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.05) 65%);
  display:flex; flex-direction:column; justify-content:flex-end;
  padding:18px;
}
.snb-bento .bento-card.card-main { grid-row:1 / 4; }
.snb-bento .bento-card.card-main .card-overlay {
  background:linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.02) 50%);
  padding:24px;
}
.snb-bento .card-label {
  font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
  color:#fff; margin-bottom:6px;
  background:linear-gradient(135deg, #E51981, #c0137a);
  display:inline-block; padding:3px 10px; border-radius:20px;
  width:fit-content;
}
.snb-bento .card-main .card-label { font-size:11px; padding:4px 12px; }
.snb-bento .card-heading {
  font-size:20px; font-weight:800; color:#fff; margin:0 0 2px;
  line-height:1.2; text-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.snb-bento .card-main .card-heading { font-size:24px; margin-bottom:4px; }
.snb-bento .card-sub {
  font-size:12px; font-weight:400; color:rgba(255,255,255,0.85); margin:0;
  line-height:1.4;
}
.snb-bento .card-arrow {
  position:absolute; top:12px; right:12px;
  width:32px; height:32px; border-radius:50%;
  background:rgba(229,25,129,0.7); backdrop-filter:blur(8px);
  display:flex; align-items:center; justify-content:center;
  transition:all 0.3s ease;
  box-shadow:0 2px 10px rgba(229,25,129,0.3);
}
.snb-bento .card-main .card-arrow { width:36px; height:36px; top:14px; right:14px; }
.snb-bento .bento-card:hover .card-arrow { background:#E51981; transform:scale(1.1); box-shadow:0 4px 16px rgba(229,25,129,0.5); }
.snb-bento .card-arrow svg { width:14px; height:14px; fill:none; stroke:#fff; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }

@media (max-width:768px) {
  .snb-bento { padding:40px 16px; }
  .snb-bento .bento-title h2 { font-size:28px; }
  .snb-bento .deco-dots { display:none; }
  .snb-bento .bento-grid {
    grid-template-columns:1fr 1fr;
    grid-template-rows:280px 180px 180px;
    gap:12px;
    height:auto;
  }
  .snb-bento .bento-card.card-main { grid-row:1 / 2; grid-column:1 / 3; }
  .snb-bento .card-main .card-heading { font-size:22px; }
  .snb-bento .card-heading { font-size:15px; }
  .snb-bento .card-sub { font-size:11px; }
  .snb-bento .card-overlay { padding:16px; }
  .snb-bento .card-main .card-overlay { padding:20px; }
  .snb-bento .bento-card.card-bleu img { transform:scale(1.15); object-position:center 80%; }
}
@media (max-width:480px) {
  .snb-bento .bento-title h2 { font-size:24px; }
  .snb-bento .bento-grid {
    grid-template-columns:1fr;
    grid-template-rows:260px 180px 180px 180px;
    gap:10px;
  }
  .snb-bento .bento-card.card-main { grid-column:1; }
  .snb-bento .card-heading { font-size:16px; }
  .snb-bento .card-main .card-heading { font-size:20px; }
}
</style>
