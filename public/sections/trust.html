<style>
.trust { background:#f8f8fa; padding:0; overflow:hidden; position:relative; z-index:5; margin-top:0; font-family:'Raleway',sans-serif; }
.trust-title-bar { text-align:center; padding:0 0 8px; }
.trust-title {
  display:inline-block; background:#fff; color:#323338; font-size:15px;
  text-transform:uppercase; letter-spacing:4px; font-weight:800;
  padding:14px 40px; border-radius:0 0 20px 20px;
  box-shadow:0 4px 25px rgba(0,0,0,0.08);
}
.trust-title span { color:#E51981; }
.trust-track-wrapper {
  position:relative; width:100%; overflow:hidden;
  -webkit-mask-image:linear-gradient(to right,transparent 0%,black 10%,black 90%,transparent 100%);
  mask-image:linear-gradient(to right,transparent 0%,black 10%,black 90%,transparent 100%);
}
.trust-track {
  display:flex; align-items:center; gap:30px; width:max-content;
  animation:scroll-logos 35s linear infinite; padding:10px 0 0;
}
.trust-track:hover { animation-play-state:paused; }
.trust-track img {
  height:110px; width:auto; object-fit:contain;
  filter:grayscale(100%); opacity:0.45;
  transition:all 0.4s ease; flex-shrink:0;
}
.trust-track img:hover { filter:grayscale(0%); opacity:1; transform:scale(1.15); }
@keyframes scroll-logos { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
@media (max-width:900px) {
  .trust { padding:0; }
  .trust-track img { height:60px; }
  .trust-track { gap:20px; animation-duration:22s; }
  .trust-title { font-size:12px; padding:10px 24px; letter-spacing:2px; }
}
</style>
